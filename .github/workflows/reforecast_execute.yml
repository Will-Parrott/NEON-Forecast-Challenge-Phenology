on:
  workflow_dispatch:

jobs:
  run_forecast:
    runs-on: ubuntu-latest
    container:
      image: eco4cast/rocker-neon4cast
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
 # Point to the right path, run the right Rscript command
      - name: Run automatic forecast submission
        run: Rscript ReforecastScript.R
        
      - name: Mark directory as safe
        run: git config --global --add safe.directory /__w/NEON-Forecast-Challenge-Phenology/NEON-Forecast-Challenge-Phenology
        
      - name: Commit and push csv
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Reforecast csv for later access"
          file_pattern: "reforecast_df.csv"
          branch: main
